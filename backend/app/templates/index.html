<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigil — Family Members</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #111111;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 48px;
      font-size: 16px;
      line-height: 1.5;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #555555;
      margin-bottom: 32px;
    }

    .member-list {
      list-style: none;
    }

    .member-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #eeeeee;
    }

    .member-list li:last-child {
      border-bottom: none;
    }

    .member-name {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .crisis-link {
      font-size: 0.85rem;
      color: #c0392b;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #c0392b;
      border-radius: 4px;
    }

    .crisis-link:hover {
      background: #c0392b;
      color: #ffffff;
    }

    .qr-link {
      font-size: 0.85rem;
      color: #2980b9;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #2980b9;
      border-radius: 4px;
    }

    .qr-link:hover {
      background: #2980b9;
      color: #ffffff;
    }

    .empty {
      color: #888888;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Your family</h1>
  <p class="subtitle">The people you're keeping ready — you've got this covered.</p>

  {% if persons %}
    <ul class="member-list">
      {% for person in persons %}
        <li>
          <span class="member-name">{{ person.full_name }}</span>
          <span class="actions">
            <a class="qr-link" href="/coordinator/persons/{{ person.id }}/qr">QR card</a>
            <a class="crisis-link" href="/c/{{ person.crisis_slug }}">Crisis page</a>
          </span>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="empty">No one here yet — this is where the people you're keeping ready will appear.</p>
  {% endif %}

</body>
</html>
